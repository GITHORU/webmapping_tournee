# ─────────────────────────────────────────────────────────────
# Tournée été 2026 — schéma de données
#
# Les coordonnées sont géocodées automatiquement à partir du nom
# de ville. Si `address` est renseignée, elle est utilisée à la place.
# Si `coords` est renseigné, il est prioritaire (pas de géocodage).
#
#   - id: 1
#     city: "Caen"
#     coords: [49.1829, -0.3707]     # [lat, lon] — prioritaire
#     address: "Esplanade Jean-Moulin, 14050 Caen"  # optionnel
#
#   lieux:
#     - name: "Nom du lieu"
#       coords: [48.6493, -2.0257]   # [lat, lon] — prioritaire
#       address: "Adresse complète"  # sinon utilisée pour le géocodage
#       query: "Nom pour géocodage"  # secours si pas d'adresse
#       icon:
#         emoji: "🏛️"
#         # ou image: "assets/svg/.../icon.svg"
#         #   color: "#16A34A"        # teinte le SVG (noir par défaut)
#         # ou color: "#1D4ED8"      # pastille colorée (sans image)
#         #   symbol: "M"
#       legend: "Texte affiché au clic sur la carte"
# ─────────────────────────────────────────────────────────────

